<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>로또 번호 추천기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2335;--border:#2a2f45;--text:#e2e8f0;--text2:#8892a4;--text3:#4a5568;--gold:#f6c90e;--blue:#4299e1;--green:#48bb78;--red:#fc8181;--orange:#f6ad55;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar h1{font-family:'Nanum Gothic Coding',monospace;font-size:.95rem;font-weight:700;color:var(--gold);}
.tbadge{font-size:.62rem;border-radius:4px;padding:3px 8px;}
.tbadge.loading{background:rgba(246,201,14,.1);color:var(--gold);border:1px solid rgba(246,201,14,.3);}
.tbadge.ok{background:rgba(72,187,120,.1);color:var(--green);border:1px solid rgba(72,187,120,.3);}
.tbadge.err{background:rgba(252,129,129,.1);color:var(--red);border:1px solid rgba(252,129,129,.3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px;}
.card-title{font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.hint{font-size:.68rem;color:var(--text3);line-height:1.7;margin-bottom:10px;}
.tw-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.tw-inp{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);color:var(--text);font-size:.88rem;font-weight:700;text-align:center;outline:none;font-family:'Nanum Gothic Coding',monospace;}
.tw-inp:focus{border-color:var(--gold);}
.run-btn{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#e8a000);color:#111;font-family:'Nanum Gothic Coding',monospace;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform .12s;margin-top:8px;}
.run-btn:active{transform:scale(.97);}
.run-btn:disabled{opacity:.5;cursor:not-allowed;}
/* 확률 그리드 */
.num-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-bottom:4px;}
.nc{display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:1;border-radius:8px;border:1px solid var(--border);background:var(--bg3);position:relative;overflow:hidden;transition:all .4s;}
.nc .nbg{position:absolute;bottom:0;left:0;width:100%;height:0;border-radius:0 0 7px 7px;transition:height .5s ease;}
.nc .nn{font-size:.75rem;font-weight:700;z-index:1;line-height:1;}
.nc .np{font-size:.68rem;font-weight:700;z-index:1;margin-top:2px;font-family:'Nanum Gothic Coding',monospace;line-height:1;}
.nc .ns{font-size:.42rem;z-index:1;margin-top:1px;color:var(--text3);line-height:1;}
.pz .np{color:var(--text3);} .pz0{opacity:.4;} .pz0 .np{color:#333;}
.pl .nbg{background:rgba(66,153,225,.3);} .pl .np{color:var(--blue);}
.pm .nbg{background:rgba(246,173,85,.4);} .pm .np{color:var(--orange);}
.ph .nbg{background:rgba(246,201,14,.5);} .ph .np{color:var(--gold);}
.pv .nbg{background:rgba(252,129,129,.6);} .pv .np{color:var(--red);}
.pp .nbg{background:rgba(252,129,129,.9);height:100%!important;} .pp .np{color:#fff;font-weight:700;}
.nc.tw-hi{border-color:var(--gold);border-width:2px;}
.nc.excluded{opacity:.3;border-color:var(--red);}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.leg{display:flex;align-items:center;gap:4px;font-size:.6rem;color:var(--text2);}
.ld{width:9px;height:9px;border-radius:2px;}
/* 결과 */
.section-header{display:flex;align-items:center;gap:8px;margin:14px 12px 8px;}
.section-line{flex:1;height:1px;background:var(--border);}
.section-label{font-size:.72rem;font-weight:700;white-space:nowrap;padding:4px 12px;border-radius:20px;background:rgba(246,201,14,.15);color:var(--gold);border:1px solid rgba(246,201,14,.3);}
.result-set{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;margin:0 12px 8px;animation:fadeIn .35s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.rs-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.rs-label{font-size:.68rem;font-weight:700;color:var(--gold);}
.rs-score{font-size:.65rem;color:var(--text3);font-family:'Nanum Gothic Coding',monospace;}
.rs-balls{display:flex;gap:6px;margin-bottom:7px;}
.rball{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;font-weight:700;font-size:.88rem;flex-shrink:0;}
.rball.tw-num{outline:3px solid var(--gold);outline-offset:2px;}
.b1{background:#f1c40f;color:#111;}.b2{background:#3498db;color:#fff;}.b3{background:#e74c3c;color:#fff;}.b4{background:#777;color:#fff;}.b5{background:#2ecc71;color:#111;}
.rs-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:.6rem;padding:2px 7px;border-radius:10px;font-weight:700;}
.tgold{background:rgba(246,201,14,.15);color:var(--gold);}
.tb{background:rgba(66,153,225,.15);color:var(--blue);}
.to{background:rgba(246,173,85,.15);color:var(--orange);}
.tg{background:rgba(72,187,120,.15);color:var(--green);}
/* 새 회차 추가 */
.save-btn{width:100%;padding:11px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}
/* 필터 박스 */
.filter-box{background:var(--bg3);border-radius:8px;padding:10px 12px;font-size:.68rem;color:var(--text2);line-height:1.9;border-left:3px solid var(--gold);}
.filter-box b{color:var(--text);}
.no-combo{text-align:center;padding:2rem;color:var(--text3);font-size:.82rem;}
</style>
</head>

<div class="topbar">
  <h1>🎯 로또 번호 추천기</h1>
  <span class="tbadge loading" id="db-badge">DB 연결 중...</span>
</div>

<!-- 새 회차 추가 -->
<div class="card">

  <div id="save-msg" style="font-size:.72rem;margin-top:8px;text-align:center"></div>
</div>

<!-- 이번 주 당첨번호 -->

  <div class="hint">

  </div>
  <div class="tw-row">
    <input type="number" min="1" max="45" class="tw-inp" id="tw0" placeholder="①">
    <input type="number" min="1" max="45" class="tw-inp" id="tw1" placeholder="②">
    <input type="number" min="1" max="45" class="tw-inp" id="tw2" placeholder="③">
    <input type="number" min="1" max="45" class="tw-inp" id="tw3" placeholder="④">
    <input type="number" min="1" max="45" class="tw-inp" id="tw4" placeholder="⑤">
    <input type="number" min="1" max="45" class="tw-inp" id="tw5" placeholder="⑥">
  </div>
  <div id="latest-info" style="margin-bottom:8px"></div>
  <button class="run-btn" onclick="runAll()" id="run-btn" disabled>✨ 분석 & 추천받기</button>
</div>

<!-- 확률 그리드 -->
<div class="card">
  <div class="card-title">📊 번호별 다음 주 출현 확률</div>
  <div class="legend">

    <div class="leg"><div class="ld" style="border:2px solid var(--gold);background:transparent"></div>이번주 당첨</div>
    <div class="leg"><div class="ld" style="border:1px solid var(--red);background:transparent;opacity:.5"></div>0%제외</div>
  </div>
  <div class="num-grid" id="num-grid"></div>
</div>

// ── 확률 계산 ──
function getStreakState(n){
  let s=0;
  for(const d of DRAWS){
    if(d[1].includes(n)){if(s>=0)s++;else break;}
    else{if(s<=0)s--;else break;}
  }
  return s;
}
function getMaxStreak(n){
  let mx=0,cur=0;
  for(let i=DRAWS.length-1;i>=0;i--){
    if(DRAWS[i][1].includes(n)){cur++;mx=Math.max(mx,cur);}else cur=0;
  }
  return mx;
}
function getMaxGap(n){
  let mx=0,cur=0;
  for(let i=DRAWS.length-1;i>=0;i--){
    if(DRAWS[i][1].includes(n)){mx=Math.max(mx,cur);cur=0;}else cur++;
  }
  return Math.max(mx,cur);
}

function calcProbs(twNums){
  const probs={};
  for(let n=1;n<=45;n++){
    const base=FP[n]||FP[String(n)]||0;
    const state=getStreakState(n);
    const maxS=getMaxStreak(n);
    const maxG=getMaxGap(n);
    if(twNums.includes(n)){
      const curS=state>0?state+1:1;
      if(curS>=maxS){probs[n]=0;continue;}
      if(curS===maxS-1){probs[n]=base*0.5;continue;}
      probs[n]=base;
    }else{
      const curG=state<0?Math.abs(state):1;
      if(curG>=maxG){probs[n]=Math.min(base*2,100);continue;}
      if(maxG>0&&curG>=maxG*0.8){probs[n]=base*1.5;continue;}
      probs[n]=base;
    }
  }
  return probs;
}

// ── 역대 패턴 ──
function calcPatterns(draws){
  const N=draws.length;
  const sums=draws.map(d=>d[1].reduce((a,v)=>a+v,0)).sort((a,b)=>a-b);
  const maxC=nums=>{const s=[...nums].sort((a,b)=>a-b);let mx=1,c=1;for(let i=1;i<6;i++){if(s[i]-s[i-1]===1){c++;mx=Math.max(mx,c);}else c=1;}return mx;};
  const maxT=nums=>{const t={};nums.forEach(n=>{const k=n%10;t[k]=(t[k]||0)+1;});return Math.max(...Object.values(t));};
  const oddD={};draws.forEach(d=>{const k=d[1].filter(n=>n%2===1).length;oddD[k]=(oddD[k]||0)+1;});
  const zones=[[1,9],[10,19],[20,29],[30,39],[40,45]];
  const zV={};
  zones.forEach(z=>{const dist={};draws.forEach(d=>{const k=d[1].filter(n=>n>=z[0]&&n<=z[1]).length;dist[k]=(dist[k]||0)+1;});zV[z.join('-')]=Object.keys(dist).map(Number).filter(k=>dist[k]>0);});
  const past=new Set(draws.map(d=>[...d[1]].sort((a,b)=>a-b).join(',')));
  return{
    sumMin:sums[Math.floor(N*0.03)],sumMax:sums[Math.floor(N*0.97)],
    maxConsec:Math.max(...draws.map(d=>maxC(d[1]))),
    maxTail:Math.max(...draws.map(d=>maxT(d[1]))),
    validOdd:Object.keys(oddD).map(Number).filter(k=>oddD[k]>0),
    zoneValid:zV,past
  };
}

function isValid(combo){
  const s=combo.reduce((a,v)=>a+v,0);
  if(s<PAT.sumMin||s>PAT.sumMax) return false;
  const sorted=[...combo].sort((a,b)=>a-b);
  let mx=1,c=1;for(let i=1;i<6;i++){if(sorted[i]-sorted[i-1]===1){c++;mx=Math.max(mx,c);}else c=1;}
  if(mx>PAT.maxConsec) return false;
  const t={};combo.forEach(n=>{const k=n%10;t[k]=(t[k]||0)+1;});
  if(Math.max(...Object.values(t))>PAT.maxTail) return false;
  if(!PAT.validOdd.includes(combo.filter(n=>n%2===1).length)) return false;
  const zones=[[1,9],[10,19],[20,29],[30,39],[40,45]];
  for(const z of zones){const cnt=combo.filter(n=>n>=z[0]&&n<=z[1]).length;if(!(PAT.zoneValid[z.join('-')]||[]).includes(cnt)) return false;}
  if(PAT.past.has([...combo].sort((a,b)=>a-b).join(','))) return false;
  return true;
}

// ── 핵심: Top15 풀에서 필터 통과 조합 최대 10개 ──
function generateTop15(twNums, probs){
  // 이번주 유효번호 (0% 제외)
  const twValid=twNums.filter(n=>probs[n]>0).sort((a,b)=>probs[b]-probs[a]);
  const twExclCnt=twNums.filter(n=>probs[n]===0).length;

  // 나머지 39개 확률 높은 순
  const nonTw=[...Array(45)].map((_,i)=>i+1).filter(n=>!twNums.includes(n))
    .sort((a,b)=>probs[b]-probs[a]);

  // Top15 풀 구성
  const needExtra=9+twExclCnt;
  const pool=[...twValid,...nonTw.slice(0,needExtra)];

  // 조합 순열 탐색 (확률 높은 순)
  const results=[]; const usedKeys=new Set();

  // pool에서 6개 조합을 확률 높은 순서대로 탐색
  // combinations 탐색 (최대 10개 찾으면 중단)
  const n=pool.length;
  outer: for(let a=0;a<n-5;a++)
    for(let b=a+1;b<n-4;b++)
      for(let c=b+1;c<n-3;c++)
        for(let d=c+1;d<n-2;d++)
          for(let e=d+1;e<n-1;e++)
            for(let f=e+1;f<n;f++){
              if(results.length>=10) break outer;
              const combo=[pool[a],pool[b],pool[c],pool[d],pool[e],pool[f]].sort((a,b)=>a-b);
              const key=combo.join(',');
              if(usedKeys.has(key)) continue;
              if(!isValid(combo)) continue;
              usedKeys.add(key);
              const score=combo.reduce((a,n)=>a+(probs[n]||0),0)/6;
              const twCnt=combo.filter(n=>twNums.includes(n)).length;
              results.push({combo,score,twCnt});
            }

  return results;
}

// ── 그리드 렌더 ──
function renderGrid(probs, twNums){
  const vals=Object.values(probs).filter(v=>v>0);
  const mx=vals.length?Math.max(...vals):1;
  let html='';
  for(let n=1;n<=45;n++){
    const p=probs[n]||0;
    const s=getStreakState(n);
    const ratio=mx>0?p/mx:0;
    let cls=p===0?'pz0':'pz';
    if(p>0) cls=ratio<0.2?'pl':ratio<0.45?'pm':ratio<0.7?'ph':ratio<0.88?'pv':'pp';
    const isTW=twNums.includes(n);
    const isExcl=isTW&&p===0;
    const stateStr=s>0?'▲'+s+'연속':'▽'+Math.abs(s)+'주';
    html+=`<div class="nc ${cls}${isTW&&!isExcl?' tw-hi':''}${isExcl?' excluded':''}">
      <div class="nbg" style="height:${p>0?Math.max(15,ratio*92)+'%':'0'}"></div>
      <span class="nn">${n}</span>
      <span class="np">${p>0?p.toFixed(1)+'%':'0%'}</span>
      <span class="ns">${stateStr}</span>
    </div>`;
  }
  document.getElementById('num-grid').innerHTML=html;
}

// ── 메인 실행 ──
function runAll(){
  const nums=[];
  for(let i=0;i<6;i++){const v=+document.getElementById('tw'+i).value;if(v>=1&&v<=45)nums.push(v);}
  const twNums=[...new Set(nums)];
  if(twNums.length!==6){alert('이번 주 당첨번호 6개를 모두 입력해주세요');return;}
  thisWeekNums=twNums;

  const probs=calcProbs(twNums);
  renderGrid(probs,twNums);

  const results=generateTop15(twNums,probs);
  renderResults(results,twNums,probs);
}

function renderResults(results,twNums,probs){
  if(results.length===0){
    document.getElementById('result-area').innerHTML=
      `<div class="no-combo">
        <div style="font-size:2rem;margin-bottom:8px">🤔</div>
        <p>Top15 풀에서 필터를 통과한 조합이 없어요<br>
        <span style="font-size:.72rem;color:var(--text3)">이번 주는 랜덤으로 구매하는 게 나을 수도 있어요</span></p>
      </div>`;
    return;
  }

  // 제외 번호 안내
  const excluded=twNums.filter(n=>(probs[n]||0)===0);
  let excHtml='';
  if(excluded.length>0){
    excHtml=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin:0 12px 8px;border-left:3px solid var(--red)">
      <p style="font-size:.72rem;color:var(--text2)">
        <b style="color:var(--red)">⚡ 0% 제외:</b> ${excluded.map(n=>`<span style="color:var(--red)">${n}번</span>`).join(', ')}
        <span style="color:var(--text3)"> (역대 연속 한계 도달)</span>
      </p>
    </div>`;
  }

  const comboCnt=results.length;
  const cost=comboCnt*1000;

  let html=excHtml;
  html+=`<div class="section-header">
    <div class="section-line"></div>
    <span class="section-label">🎯 추천 번호 ${comboCnt}세트 (비용 ${cost.toLocaleString()}원)</span>
    <div class="section-line"></div>
  </div>`;

  results.forEach((r,i)=>{
    const s=r.combo.reduce((a,v)=>a+v,0);
    const odd=r.combo.filter(n=>n%2===1).length;
    const twIncluded=r.combo.filter(n=>twNums.includes(n));
    html+=`<div class="result-set" style="animation-delay:${i*0.06}s">
      <div class="rs-top">
        <span class="rs-label">${i+1}번 세트</span>
        <span class="rs-score">평균 ${r.score.toFixed(1)}%</span>
      </div>
      <div class="rs-balls">
        ${r.combo.map(n=>`<span class="rball ${bc(n)}${twNums.includes(n)?' tw-num':''}">${n}</span>`).join('')}
      </div>
      <div class="rs-tags">
        <span class="tag tgold">합계 ${s}</span>
        <span class="tag tb">홀${odd}:짝${6-odd}</span>
        ${twIncluded.length>0?`<span class="tag tg">이번주 ${twIncluded.join(',')} 포함</span>`:''}
        <span class="tag to">${r.combo.map(n=>(probs[n]||0).toFixed(1)+'%').join(' ')}</span>
      </div>
    </div>`;
  });

  document.getElementById('result-area').innerHTML=html;
}

  const nums=[n1,n2,n3,n4,n5,n6];
  if(nums.some(n=>!n||n<1||n>45)){msg.innerHTML='<span style="color:var(--red)">번호 6개를 올바르게 입력해주세요</span>';return;}
  if(new Set(nums).size!==6){msg.innerHTML='<span style="color:var(--red)">중복된 번호가 있어요</span>';return;}
  btn.disabled=true; btn.textContent='저장 중...'; msg.innerHTML='';
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/lotto_draws`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({draw_no:round,n1,n2,n3,n4,n5,n6,bonus:bonus||0,prize1:0,winner1:0})
    });
    if(res.ok){
      msg.innerHTML=`<span style="color:var(--green)">✓ ${round}회 저장 완료! 새로고침하면 반영돼요</span>`;
      btn.textContent='✓ 저장됨';
      ['new-round','new-n1','new-n2','new-n3','new-n4','new-n5','new-n6','new-bonus'].forEach(id=>{document.getElementById(id).value='';});
      const newRoundEl=document.getElementById('new-round');
      if(newRoundEl) newRoundEl.value=round+1;
    }else{
      const err=await res.text();
      msg.innerHTML=err.includes('duplicate')||err.includes('unique')
        ?'<span style="color:var(--orange)">이미 저장된 회차예요</span>'
        :`<span style="color:var(--red)">저장 실패</span>`;
      btn.disabled=false; btn.textContent='💾 Supabase에 저장하기';
    }
  }catch(e){
    msg.innerHTML=`<span style="color:var(--red)">오류: ${e.message}</span>`;
    btn.disabled=false; btn.textContent='💾 Supabase에 저장하기';
  }
}

window.addEventListener('load', loadDraws);
</script>
</body>
</html>
