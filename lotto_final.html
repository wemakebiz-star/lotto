<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>로또 번호 추천기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2335;--border:#2a2f45;--text:#e2e8f0;--text2:#8892a4;--text3:#4a5568;--gold:#f6c90e;--blue:#4299e1;--green:#48bb78;--red:#fc8181;--orange:#f6ad55;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar h1{font-family:'Nanum Gothic Coding',monospace;font-size:.95rem;font-weight:700;color:var(--gold);}
.tbadge{font-size:.62rem;border-radius:4px;padding:3px 8px;}
.tbadge.loading{background:rgba(246,201,14,.1);color:var(--gold);border:1px solid rgba(246,201,14,.3);}
.tbadge.ok{background:rgba(72,187,120,.1);color:var(--green);border:1px solid rgba(72,187,120,.3);}
.tbadge.err{background:rgba(252,129,129,.1);color:var(--red);border:1px solid rgba(252,129,129,.3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px;}
.card-title{font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.hint{font-size:.68rem;color:var(--text3);line-height:1.7;margin-bottom:10px;}
.tw-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.tw-inp{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);color:var(--text);font-size:.88rem;font-weight:700;text-align:center;outline:none;font-family:'Nanum Gothic Coding',monospace;}
.tw-inp:focus{border-color:var(--gold);}
.run-btn{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#e8a000);color:#111;font-family:'Nanum Gothic Coding',monospace;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform .12s;margin-top:8px;}
.run-btn:active{transform:scale(.97);}
.run-btn:disabled{opacity:.5;cursor:not-allowed;}
.num-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-bottom:4px;}
.nc{display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:1;border-radius:8px;border:1px solid var(--border);background:var(--bg3);position:relative;overflow:hidden;transition:all .4s;}
.nc .nbg{position:absolute;bottom:0;left:0;width:100%;height:0;border-radius:0 0 7px 7px;transition:height .5s ease;}
.nc .nn{font-size:.82rem;font-weight:700;z-index:1;line-height:1;}
.nc .np{font-size:.68rem;z-index:1;margin-top:2px;font-family:'Nanum Gothic Coding',monospace;line-height:1;font-weight:700;}
.nc .ns{font-size:.42rem;z-index:1;margin-top:1px;color:var(--text3);line-height:1;}
.pz .np{color:var(--text3);} .pz0{opacity:.4;} .pz0 .np{color:#333;}
.pl .nbg{background:rgba(66,153,225,.3);} .pl .np{color:var(--blue);}
.pm .nbg{background:rgba(246,173,85,.4);} .pm .np{color:var(--orange);}
.ph .nbg{background:rgba(246,201,14,.5);} .ph .np{color:var(--gold);}
.pv .nbg{background:rgba(252,129,129,.6);} .pv .np{color:var(--red);}
.pp .nbg{background:rgba(252,129,129,.9);height:100%!important;} .pp .np{color:#fff;font-weight:700;}
.nc.tw-hi{border-color:var(--gold);border-width:2px;}
.nc.tw-ex{opacity:.35;border-color:var(--red)!important;border-width:1px!important;}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.leg{display:flex;align-items:center;gap:4px;font-size:.6rem;color:var(--text2);}
.ld{width:9px;height:9px;border-radius:2px;}
.section-header{display:flex;align-items:center;gap:8px;margin:16px 12px 8px;}
.section-line{flex:1;height:1px;background:var(--border);}
.section-label{font-size:.72rem;font-weight:700;white-space:nowrap;padding:4px 12px;border-radius:20px;}
.sl-one{background:rgba(246,201,14,.15);color:var(--gold);border:1px solid rgba(246,201,14,.3);}
.sl-zero{background:rgba(66,153,225,.15);color:var(--blue);border:1px solid rgba(66,153,225,.3);}
.result-set{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px;margin:0 12px 8px;animation:fadeIn .35s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.rs-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.rs-label{font-size:.68rem;font-weight:700;}
.rs-score{font-size:.65rem;color:var(--text3);font-family:'Nanum Gothic Coding',monospace;}
.rs-balls{display:flex;gap:6px;margin-bottom:7px;}
.rball{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;font-weight:700;font-size:.85rem;flex-shrink:0;}
.rball.fixed{outline:3px solid var(--gold);outline-offset:2px;}
.b1{background:#f1c40f;color:#111;}.b2{background:#3498db;color:#fff;}.b3{background:#e74c3c;color:#fff;}.b4{background:#777;color:#fff;}.b5{background:#2ecc71;color:#111;}
.rs-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:.6rem;padding:2px 7px;border-radius:10px;font-weight:700;}
.tg{background:rgba(72,187,120,.15);color:var(--green);}
.tb{background:rgba(66,153,225,.15);color:var(--blue);}
.to{background:rgba(246,173,85,.15);color:var(--orange);}
.tgold{background:rgba(246,201,14,.15);color:var(--gold);}
.tr{background:rgba(252,129,129,.15);color:var(--red);}
.filter-box{background:var(--bg3);border-radius:8px;padding:10.px 12px;font-size:.68rem;color:var(--text2);line-height:1.9;border-left:3px solid var(--gold);padding:10px 12px;}
.filter-box b{color:var(--text);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
  <h1>🎯 로또 번호 추천기</h1>
  <span class="tbadge loading" id="db-badge">DB 연결 중...</span>
</div>

<!-- 새 회차 추가 -->
<div class="card">
  <div class="card-title">➕ 새 회차 당첨번호 추가</div>
  <div class="hint">추첨 후 번호를 입력하면 Supabase에 자동 저장돼요</div>
  <div style="margin-bottom:8px">
    <div style="font-size:.68rem;color:var(--text2);margin-bottom:4px">회차 번호</div>
    <input type="number" id="new-round" placeholder="예: 1225" class="tw-inp" style="width:80px;border-radius:8px;height:38px">
  </div>
  <div style="font-size:.68rem;color:var(--text2);margin-bottom:4px">당첨번호 6개 + 보너스</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:10px">
    <input type="number" min="1" max="45" class="tw-inp" id="new-n1" placeholder="①" style="height:38px">
    <input type="number" min="1" max="45" class="tw-inp" id="new-n2" placeholder="②" style="height:38px">
    <input type="number" min="1" max="45" class="tw-inp" id="new-n3" placeholder="③" style="height:38px">
    <input type="number" min="1" max="45" class="tw-inp" id="new-n4" placeholder="④" style="height:38px">
    <input type="number" min="1" max="45" class="tw-inp" id="new-n5" placeholder="⑤" style="height:38px">
    <input type="number" min="1" max="45" class="tw-inp" id="new-n6" placeholder="⑥" style="height:38px">
    <input type="number" min="1" max="45" class="tw-inp" id="new-bonus" placeholder="보너스" style="height:38px;border-color:rgba(246,201,14,.4)">
  </div>
  <button onclick="saveNewDraw()" style="width:100%;padding:11px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;" id="save-btn">💾 Supabase에 저장하기</button>
  <div id="save-msg" style="font-size:.72rem;margin-top:8px;text-align:center"></div>
</div>

<!-- 이번 주 당첨번호 -->
<div class="card">
  <div class="card-title">🏆 이번 주 당첨번호</div>
  <div class="hint">
    번호 입력 후 분석 실행 → <b style="color:var(--text)">항상 동일한 최적 조합</b> 추천<br>
    📌 역대: 1개 겹침 42.4% | 0개 겹침 38.5%<br>
    ⚡ 이번 주 번호 중 <b style="color:var(--text)">10% 미만</b>은 자동 제외
  </div>
  <div class="tw-row">
    <input type="number" min="1" max="45" class="tw-inp" id="tw0" placeholder="①">
    <input type="number" min="1" max="45" class="tw-inp" id="tw1" placeholder="②">
    <input type="number" min="1" max="45" class="tw-inp" id="tw2" placeholder="③">
    <input type="number" min="1" max="45" class="tw-inp" id="tw3" placeholder="④">
    <input type="number" min="1" max="45" class="tw-inp" id="tw4" placeholder="⑤">
    <input type="number" min="1" max="45" class="tw-inp" id="tw5" placeholder="⑥">
  </div>
  <div id="latest-info" style="margin-bottom:8px"></div>
  <button class="run-btn" onclick="runAll()" id="run-btn" disabled>✨ 분석 & 추천받기</button>
</div>

<!-- 확률 그리드 -->
<div class="card">
  <div class="card-title">📊 번호별 다음 주 출현 확률</div>
  <div class="legend">
    <div class="leg"><div class="ld" style="background:rgba(66,153,225,.4)"></div>낮음</div>
    <div class="leg"><div class="ld" style="background:rgba(246,173,85,.5)"></div>보통</div>
    <div class="leg"><div class="ld" style="background:rgba(246,201,14,.6)"></div>높음</div>
    <div class="leg"><div class="ld" style="background:rgba(252,129,129,.8)"></div>매우높음</div>
    <div class="leg"><div class="ld" style="border:2px solid var(--gold);background:transparent"></div>이번주 당첨</div>
    <div class="leg"><div class="ld" style="border:1px solid var(--red);background:transparent;opacity:.5"></div>10%미만 제외</div>
  </div>
  <div class="num-grid" id="num-grid"></div>
</div>

<!-- 필터 정보 -->
<div class="card">
  <div class="card-title">🔍 역대 패턴 자동 필터</div>
  <div class="filter-box" id="filter-box">데이터 로딩 후 표시됩니다</div>
</div>

<div id="result-area"></div>

let DRAWS=[];
let PAT=null;

function bc(n){if(n<=10)return'b1';if(n<=20)return'b2';if(n<=30)return'b3';if(n<=40)return'b4';return'b5';}
function isPastCombo(combo){return PAST_COMBOS.has([...combo].sort((a,b)=>a-b).join(','));}

// ── Supabase 로드 ──
async function loadDraws(){
  const badge=document.getElementById('db-badge');
  try{
    const [r1,r2]=await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/lotto_draws?select=draw_no,n1,n2,n3,n4,n5,n6,bonus&order=draw_no.desc&limit=1000`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}}),
      fetch(`${SUPABASE_URL}/rest/v1/lotto_draws?select=draw_no,n1,n2,n3,n4,n5,n6,bonus&order=draw_no.desc&offset=1000&limit=1000`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}})
    ]);
    const [d1,d2]=await Promise.all([r1.json(),r2.json()]);
    DRAWS=[...d1,...d2].map(r=>[r.draw_no,[r.n1,r.n2,r.n3,r.n4,r.n5,r.n6],r.bonus]);

    // Supabase에서 가져온 새 조합도 PAST_COMBOS에 추가
    DRAWS.forEach(d=>PAST_COMBOS.add([...d[1]].sort((a,b)=>a-b).join(',')));

    badge.className='tbadge ok';
    badge.textContent=`✓ ${DRAWS.length}회차 로드됨`;

    const latest=DRAWS[0];
    latest[1].forEach((v,i)=>{const el=document.getElementById('tw'+i);if(el)el.value=v;});
    document.getElementById('latest-info').innerHTML=
      `<span style="font-family:'Nanum Gothic Coding',monospace;font-size:.9rem;font-weight:700;color:var(--gold);background:rgba(246,201,14,.15);border:1px solid rgba(246,201,14,.3);border-radius:6px;padding:3px 10px">${latest[0]}회</span>
       <span style="font-size:.68rem;color:var(--text3);margin-left:6px">기준으로 분석합니다</span>`;
    // 새 회차 입력란에 마지막 회차 + 1 자동 표시
    const newRoundEl = document.getElementById('new-round');
    if(newRoundEl) newRoundEl.value = latest[0] + 1;

    PAT=calcPatterns();
    document.getElementById('filter-box').innerHTML=
      `<b>합계 범위:</b> ${PAT.sumMin}~${PAT.sumMax} &nbsp;|&nbsp;
       <b>최대 연속번호:</b> ${PAT.maxConsec}개 이하 &nbsp;|&nbsp;
       <b>같은 끝자리:</b> ${PAT.maxTail}개 이하<br>
       <b>허용 홀수:</b> ${PAT.validOdd.sort((a,b)=>a-b).join(', ')}개 &nbsp;|&nbsp;
       <b>이번주 10% 미만 제외</b> &nbsp;|&nbsp; <b>역대 당첨 조합 제외</b>`;

    document.getElementById('run-btn').disabled=false;
    const state={};for(let n=1;n<=45;n++) state[n]=parseInt(BASE_STATE[String(n)]||0);
    const probs={};for(let n=1;n<=45;n++) probs[n]=getProb(n,state);
    renderGrid(probs,latest[1],[]);
  }catch(e){
    badge.className='tbadge err';badge.textContent='DB 연결 실패';
    console.error(e);
  }
}

// ── 확률 ──
function getProb(n,state){
  const s=state[n]||0;
  if(s>0) return parseFloat((PA[String(n)]||{})[String(s)]||0);
  return parseFloat((PB[String(n)]||{})[String(Math.abs(s))]||0);
}
function calcState(twNums){
  const state={};
  for(let n=1;n<=45;n++){
    const base=parseInt(BASE_STATE[String(n)]||0);
    state[n]=twNums.includes(n)?(base>0?base+1:1):(base<0?base-1:-1);
  }
  return state;
}

// ── 역대 패턴 ──
function calcPatterns(){
  const N=DRAWS.length;
  const sums=DRAWS.map(d=>d[1].reduce((a,v)=>a+v,0)).sort((a,b)=>a-b);
  const maxC=d=>{const s=[...d].sort((a,b)=>a-b);let mx=1,c=1;for(let i=1;i<6;i++){if(s[i]-s[i-1]===1){c++;mx=Math.max(mx,c);}else c=1;}return mx;};
  const maxT=d=>{const t={};d.forEach(n=>{const k=n%10;t[k]=(t[k]||0)+1;});return Math.max(...Object.values(t));};
  const oddD={};DRAWS.forEach(d=>{const k=d[1].filter(n=>n%2===1).length;oddD[k]=(oddD[k]||0)+1;});
  const zones=[[1,9],[10,19],[20,29],[30,39],[40,45]];
  const zV={};
  zones.forEach(z=>{const dist={};DRAWS.forEach(d=>{const k=d[1].filter(n=>n>=z[0]&&n<=z[1]).length;dist[k]=(dist[k]||0)+1;});zV[z.join('-')]=Object.keys(dist).map(Number).filter(k=>dist[k]>0);});
  return{sumMin:sums[Math.floor(N*0.03)],sumMax:sums[Math.floor(N*0.97)],maxConsec:Math.max(...DRAWS.map(d=>maxC(d[1]))),maxTail:Math.max(...DRAWS.map(d=>maxT(d[1]))),validOdd:Object.keys(oddD).map(Number).filter(k=>oddD[k]>0),zoneValid:zV};
}

function isValid(combo){
  const s=combo.reduce((a,v)=>a+v,0);
  if(s<PAT.sumMin||s>PAT.sumMax) return false;
  const sorted=[...combo].sort((a,b)=>a-b);
  let mx=1,c=1;for(let i=1;i<6;i++){if(sorted[i]-sorted[i-1]===1){c++;mx=Math.max(mx,c);}else c=1;}
  if(mx>PAT.maxConsec) return false;
  const t={};combo.forEach(n=>{const k=n%10;t[k]=(t[k]||0)+1;});
  if(Math.max(...Object.values(t))>PAT.maxTail) return false;
  if(!PAT.validOdd.includes(combo.filter(n=>n%2===1).length)) return false;
  const zones=[[1,9],[10,19],[20,29],[30,39],[40,45]];
  for(const z of zones){const cnt=combo.filter(n=>n>=z[0]&&n<=z[1]).length;if(!(PAT.zoneValid[z.join('-')]||[]).includes(cnt)) return false;}
  // 역대 당첨 조합 제외
  if(isPastCombo(combo)) return false;
  return true;
}

// ── 최적 조합 생성 ──
function findBestCombos(pool,probs,fixedNums,wantCount){
  const sorted=[...pool].sort((a,b)=>(probs[b]||0)-(probs[a]||0));
  const results=[];
  const usedKeys=new Set();
  const need=6-fixedNums.length;
  const candidates=sorted.slice(0,Math.min(35,sorted.length));

  for(let skip1=0;skip1<=candidates.length-need&&results.length<wantCount;skip1++){
    const pool1=candidates.filter((_,i)=>i!==skip1);
    if(pool1.length>=need){
      const pick=pool1.slice(0,need);
      const combo=[...fixedNums,...pick].sort((a,b)=>a-b);
      const key=combo.join(',');
      if(!usedKeys.has(key)&&isValid(combo)){
        usedKeys.add(key);
        results.push({combo,score:combo.reduce((a,n)=>a+(probs[n]||0),0)/6,key});
      }
    }
    for(let skip2=0;skip2<skip1&&results.length<wantCount;skip2++){
      const pool2=pool1.filter((_,i)=>i!==skip2);
      if(pool2.length<need) continue;
      const pick=pool2.slice(0,need);
      const combo=[...fixedNums,...pick].sort((a,b)=>a-b);
      const key=combo.join(',');
      if(!usedKeys.has(key)&&isValid(combo)){
        usedKeys.add(key);
        results.push({combo,score:combo.reduce((a,n)=>a+(probs[n]||0),0)/6,key});
      }
    }
  }
  return results.sort((a,b)=>b.score-a.score).slice(0,wantCount);
}

// ── 그리드 ──
function renderGrid(probs,twNums,excludedNums){
  const vals=Object.values(probs).filter(v=>v>0);
  const mx=vals.length?Math.max(...vals):1;
  let html='';
  for(let n=1;n<=45;n++){
    const p=probs[n]||0,s=parseInt(BASE_STATE[String(n)]||0);
    const ratio=mx>0?p/mx:0;
    let cls=p===0?'pz0':'pz';
    if(p>0) cls=ratio<0.2?'pl':ratio<0.45?'pm':ratio<0.7?'ph':ratio<0.88?'pv':'pp';
    const isTW=twNums.includes(n);
    const isEx=excludedNums.includes(n);
    html+=`<div class="nc ${cls}${isTW&&!isEx?' tw-hi':''}${isEx?' tw-ex':''}">
      <div class="nbg" style="height:${p>0?Math.max(15,ratio*92)+'%':'0'}"></div>
      <span class="nn">${n}</span>
      <span class="np">${p>0?p.toFixed(1)+'%':'0%'}</span>
      <span class="ns">${s>0?'▲'+s+'연속':'▽'+Math.abs(s)+'주'}</span>
    </div>`;
  }
  document.getElementById('num-grid').innerHTML=html;
}

// ── 메인 실행 ──
function runAll(){
  const nums=[];
  for(let i=0;i<6;i++){const v=+document.getElementById('tw'+i).value;if(v>=1&&v<=45)nums.push(v);}
  const twNums=[...new Set(nums)];
  if(twNums.length!==6){alert('이번 주 당첨번호 6개를 모두 입력해주세요');return;}

  const state=calcState(twNums);
  const probs={};for(let n=1;n<=45;n++) probs[n]=getProb(n,state);

  // 10% 미만 제외 번호 계산
  const twOver10=twNums.filter(n=>probs[n]>=10);
  const twUnder10=twNums.filter(n=>probs[n]<10);

  renderGrid(probs,twNums,twUnder10);

  // 전체 45개 중 확률 높은 순 (이번 주 번호 제외)
  const allPool=Array.from({length:45},(_,i)=>i+1).filter(n=>!twNums.includes(n));
  const nonTW=allPool;

  // 10% 이상인 이번 주 번호 → 각 2세트
  // 10% 미만으로 빠진 번호 수만큼 → 전체에서 확률 높은 번호로 대체 → 각 2세트
  const oneResults=[];

  // 이번 주 번호 중 10% 이상인 번호 고정
  for(const fixed of twOver10){
    const combos=findBestCombos(nonTW,probs,[fixed],2);
    combos.forEach(r=>oneResults.push({...r,fixed,fixedType:'이번주'}));
  }

  // 빠진 수만큼 전체에서 확률 높은 번호로 대체
  const replaceCnt=twUnder10.length;
  if(replaceCnt>0){
    // 전체 풀에서 확률 높은 번호 (이번 주 번호 전체 제외)
    const fullPool=Array.from({length:45},(_,i)=>i+1).filter(n=>!twNums.includes(n));
    const topByProb=fullPool.sort((a,b)=>(probs[b]||0)-(probs[a]||0));
    // 상위 replaceCnt개 번호를 각각 고정해서 2세트씩
    for(let i=0;i<Math.min(replaceCnt,topByProb.length);i++){
      const fixed=topByProb[i];
      const pool=fullPool.filter(n=>n!==fixed);
      const combos=findBestCombos(pool,probs,[fixed],2);
      combos.forEach(r=>oneResults.push({...r,fixed,fixedType:'대체'}));
    }
  }

  // 0개 포함 8세트
  const zeroResults=findBestCombos(nonTW,probs,[],8);

  renderResults(oneResults,zeroResults,twNums,twUnder10,probs);
}

function renderResults(oneResults,zeroResults,twNums,twUnder10,probs){
  let html='';

  // 제외 번호 안내
  if(twUnder10.length>0){
    const excInfo=twUnder10.map(n=>`<span style="color:var(--red)">${n}번(${probs[n].toFixed(1)}%)</span>`).join(', ');
    const repPool=Array.from({length:45},(_,i)=>i+1).filter(n=>!twNums.includes(n)).sort((a,b)=>(probs[b]||0)-(probs[a]||0));
    const repInfo=repPool.slice(0,twUnder10.length).map(n=>`<span style="color:var(--green)">${n}번(${probs[n].toFixed(1)}%)</span>`).join(', ');
    html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:0 12px 8px;border-left:3px solid var(--red)">
      <p style="font-size:.72rem;color:var(--text2);line-height:1.9">
        <b style="color:var(--red)">⚡ 10% 미만 제외:</b> ${excInfo}<br>
        <b style="color:var(--green)">✦ 대체 번호:</b> ${repInfo}
      </p>
    </div>`;
  }

  html+=`<div class="section-header">
    <div class="section-line"></div>
    <span class="section-label sl-one">🎯 이번주 1개 포함 (12세트) — 역대 42.4%</span>
    <div class="section-line"></div>
  </div>`;

  oneResults.forEach((r,i)=>{
    const s=r.combo.reduce((a,v)=>a+v,0);
    const odd=r.combo.filter(n=>n%2===1).length;
    const isReplace=r.fixedType==='대체';
    html+=`<div class="result-set">
      <div class="rs-top">
        <span class="rs-label" style="color:${isReplace?'var(--green)':'var(--gold)'}">
          <span class="rball ${bc(r.fixed)}" style="width:22px;height:22px;font-size:.62rem;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700">${r.fixed}</span>
          고정${isReplace?' (대체)':''} — ${(i%2)+1}번째
        </span>
        <span class="rs-score">평균 ${r.score.toFixed(1)}%</span>
      </div>
      <div class="rs-balls">${r.combo.map(n=>`<span class="rball ${bc(n)}${n===r.fixed?' fixed':''}">${n}</span>`).join('')}</div>
      <div class="rs-tags">
        <span class="tag tgold">합계 ${s}</span>
        <span class="tag tb">홀${odd}:짝${6-odd}</span>
        <span class="tag to">${r.combo.map(n=>(probs[n]||0).toFixed(1)+'%').join(' ')}</span>
      </div>
    </div>`;
  });

  html+=`<div class="section-header" style="margin-top:8px">
    <div class="section-line"></div>
    <span class="section-label sl-zero">🎲 이번주 0개 포함 (8세트) — 역대 38.5%</span>
    <div class="section-line"></div>
  </div>`;

  zeroResults.forEach((r,i)=>{
    const s=r.combo.reduce((a,v)=>a+v,0);
    const odd=r.combo.filter(n=>n%2===1).length;
    html+=`<div class="result-set">
      <div class="rs-top">
        <span class="rs-label" style="color:var(--blue)">${i+1}번째 조합</span>
        <span class="rs-score">평균 ${r.score.toFixed(1)}%</span>
      </div>
      <div class="rs-balls">${r.combo.map(n=>`<span class="rball ${bc(n)}">${n}</span>`).join('')}</div>
      <div class="rs-tags">
        <span class="tag tgold">합계 ${s}</span>
        <span class="tag tb">홀${odd}:짝${6-odd}</span>
        <span class="tag to">${r.combo.map(n=>(probs[n]||0).toFixed(1)+'%').join(' ')}</span>
      </div>
    </div>`;
  });

  document.getElementById('result-area').innerHTML=html;
}

// ── 새 회차 저장 ──
async function saveNewDraw(){
  const round=+document.getElementById('new-round').value;
  const n1=+document.getElementById('new-n1').value;
  const n2=+document.getElementById('new-n2').value;
  const n3=+document.getElementById('new-n3').value;
  const n4=+document.getElementById('new-n4').value;
  const n5=+document.getElementById('new-n5').value;
  const n6=+document.getElementById('new-n6').value;
  const bonus=+document.getElementById('new-bonus').value;
  const msg=document.getElementById('save-msg');
  const btn=document.getElementById('save-btn');

  if(!round||round<1){msg.innerHTML='<span style="color:var(--red)">회차 번호를 입력해주세요</span>';return;}
  const nums=[n1,n2,n3,n4,n5,n6];
  if(nums.some(n=>!n||n<1||n>45)){msg.innerHTML='<span style="color:var(--red)">번호 6개를 올바르게 입력해주세요</span>';return;}
  if(new Set(nums).size!==6){msg.innerHTML='<span style="color:var(--red)">중복된 번호가 있어요</span>';return;}
  if(!bonus||bonus<1||bonus>45){msg.innerHTML='<span style="color:var(--red)">보너스 번호를 입력해주세요</span>';return;}

  btn.disabled=true;btn.textContent='저장 중...';msg.innerHTML='';

  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/lotto_draws`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({draw_no:round,n1,n2,n3,n4,n5,n6,bonus,prize1:0,winner1:0})
    });
    if(res.ok){
      msg.innerHTML=`<span style="color:var(--green)">✓ ${round}회 저장 완료! 페이지를 새로고침하면 반영돼요</span>`;
      btn.textContent='✓ 저장됨';
      ['new-round','new-n1','new-n2','new-n3','new-n4','new-n5','new-n6','new-bonus'].forEach(id=>{document.getElementById(id).value='';} );
    }else{
      const err=await res.text();
      msg.innerHTML=err.includes('duplicate')||err.includes('unique')
        ?'<span style="color:var(--orange)">이미 저장된 회차예요</span>'
        :`<span style="color:var(--red)">저장 실패</span>`;
      btn.disabled=false;btn.textContent='💾 Supabase에 저장하기';
    }
  }catch(e){
    msg.innerHTML=`<span style="color:var(--red)">오류: ${e.message}</span>`;
    btn.disabled=false;btn.textContent='💾 Supabase에 저장하기';
  }
}
